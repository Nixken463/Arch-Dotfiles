
  monitor= DP-1, 2560x1440@144, 0x0, 1
  monitor= DP-2, 2560x1440@144, -2560x0 , 1 
  exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets,ssh
  exec-once = protonvpn-app &

  exec-once = [workspace 2 silent] firefox
  exec-once = [workspace 4 silent] kitty -e jellyfin-desktop
  exec-once = [workspace 4 silent] kitty -e cava
  exec-once = [workspace 3 silent] discord
exec-once = solaar &
exec-once = syncthing &

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = de
    kb_variant = 
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    accel_profile = flat

    sensitivity = 1 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

$mainMod = SUPER # Sets "Windows" key as main modifier
$mod = LCTRL
# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, W, killactive,
bind = SUPER, L, exec, qs -c noctalia-shell ipc call sessionMenu toggle
bind = $mainMod, D, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mod, G, exec, $menu
bind = $mainMod, A, layoutmsg, swapwithmaster auto
bind = $mainMod, F, exec, firefox
bind = $mainMod, T, exec,waypaper 
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $SUPER, 1, movetoworkspace, 1
bind = $SUPER, 2, movetoworkspace, 2
bind = $SUPER, 3, movetoworkspace, 3
bind = $SUPER, 4, movetoworkspace, 4
bind = $SUPER, 5, movetoworkspace, 5
bind = $SUPER, 6, movetoworkspace, 6
bind = $SUPER, 7, movetoworkspace, 7
bind = $SUPER, 8, movetoworkspace, 8
bind = $SUPER, 9, movetoworkspace, 9
bind = $SUPER, 0, movetoworkspace, 10
# Split windows horizontally and vertically



# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $SUPER, S, movetoworkspace, special:magic



