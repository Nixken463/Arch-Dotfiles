


  # #######################################################################################
  # AUTOGENERATED HYPR CONFIG.
  # PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
  # OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
  # #######################################################################################

  #autogenerated = 1 # remove this line to remove the warning

  # This is an example Hyprland config file.
  # Refer to the wiki for more information.
  # https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

  # Please note not all available settings / options are set here.
  # For a full list, see the wiki

  # You can split this configuration into multiple files
  # Create your files separately and then link them to this file like this:
  # source = ~/.config/hypr/myColors.conf
  #
  #

  #################
  ### Windowrule###
  #################
windowrule = opacity 0.95, match:class nvim
windowrule = opacity 0.9, match:class vesktop
windowrule = opacity 0.95, match:class Code
windowrule = float on, match:class waypaper
  ################
  ### MONITORS ###
  ################

  # See https://wiki.hyprland.org/Configuring/Monitors/

  monitor= DP-1, 2560x1440@144, 0x0, 1
  monitor= DP-2, 2560x1440@144, -2560x0 , 1 
  ###################
  ### MY PROGRAMS ###
  ###################

  # See https://wiki.hyprland.org/Configuring/Keywords/

  # Set programs that you use
  $terminal = kitty
  $fileManager = thunar
  $menu = qs -c noctalia-shell ipc call launcher toggle


  #################
  ### AUTOSTART ###
  #################

  # Autostart necessary processes (like notifications daemons, status bars, etc.)
  # Or execute your favorite apps at launch like this:

  # exec-once = $terminal
  exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets,ssh
  exec-once = qs -c noctalia-shell
  exec-once = protonvpn-app &

  exec-once = [workspace 2 silent] zen-browser
  exec-once = [workspace 4 silent] kitty -e jellyfin-desktop
  exec-once = [workspace 4 silent] kitty -e cava
  exec-once = [workspace 3 silent] discord
exec-once = solaar &
exec-once = syncthing &
#exec-once = ~/.config/hypr/Scripts/swww-restore.sh
exec-once = swww-daemon &


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 3

    gaps_out = 5  

    border_size = 1
    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(b154e2ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 5

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

  

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true


    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 5, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
      new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant = colemak_dh
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    accel_profile = flat

    sensitivity = 1 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = ALT # Sets "Windows" key as main modifier
$mod = LCTRL
# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, W, killactive,
bind = SUPER, L, exec, wlogout
bind = $mainMod, D, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mod, SPACE, exec, $menu
bind = $mainMod, A, layoutmsg, swapwithmaster auto
bind = $mainMod, F, exec, zen-browser
bind = SUPER, W, exec, hyprshot -m window -z -o /home/nix/Pictures/screenshots/
bind = SUPER, Q, exec, hyprshot -m region -z -o /home/nix/Pictures/screenshots/
bind = SUPER, E, exec, hyprshot -m output -z -o /home/nix/Pictures/screenshots/
bind = SUPER, P, exec, hyprpicker -a
bind = $mainMod, T, exec,waypaper 
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mod, EQUAL, exec, ~/.config/hypr/Scripts/switchGameConf.sh; notify-send "Keyboard Layout: US QWERTY"

bind = $mod, MINUS, exec, ~/.config/hypr/Scripts/switchNormalConf.sh; notify-send "Keyboard Layout: Colemak-DH"
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $SUPER, 1, movetoworkspace, 1
bind = $SUPER, 2, movetoworkspace, 2
bind = $SUPER, 3, movetoworkspace, 3
bind = $SUPER, 4, movetoworkspace, 4
bind = $SUPER, 5, movetoworkspace, 5
bind = $SUPER, 6, movetoworkspace, 6
bind = $SUPER, 7, movetoworkspace, 7
bind = $SUPER, 8, movetoworkspace, 8
bind = $SUPER, 9, movetoworkspace, 9
bind = $SUPER, 0, movetoworkspace, 10
# Split windows horizontally and vertically



# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $SUPER, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0




